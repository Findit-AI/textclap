name: CI

on:
  push:
    branches: [main, "0.*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 1 * *" # monthly

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        features: ["", "--all-features"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets ${{ matrix.features }} -- -D warnings

  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --verbose
      - run: cargo test --lib --verbose

  doctest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --doc --all-features

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-tarpaulin
      - run: cargo tarpaulin --out Xml --workspace --all-features
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cobertura.xml

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: ~/textclap-models
          key: textclap-models-${{ hashFiles('tests/fixtures/MODELS.md') }}
      - name: Download models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/textclap-models
          # HF revision pin: parsed from the `Revision: <sha>` line in MODELS.md.
          REV=$(awk '/^Revision:/ {print $2; exit}' tests/fixtures/MODELS.md)
          if [ -z "$REV" ]; then echo "Could not parse Revision: from MODELS.md" >&2; exit 1; fi
          curl -L -o ~/textclap-models/audio_model_quantized.onnx \
            "https://huggingface.co/Xenova/clap-htsat-unfused/resolve/${REV}/onnx/audio_model_quantized.onnx"
          curl -L -o ~/textclap-models/text_model_quantized.onnx \
            "https://huggingface.co/Xenova/clap-htsat-unfused/resolve/${REV}/onnx/text_model_quantized.onnx"
          curl -L -o ~/textclap-models/tokenizer.json \
            "https://huggingface.co/Xenova/clap-htsat-unfused/resolve/${REV}/tokenizer.json"
          # Verify SHA256s using the native sha256sum sidecar.
          cd ~/textclap-models
          sha256sum -c "$GITHUB_WORKSPACE/tests/fixtures/MODELS.sha256"
      - name: Run integration tests
        env:
          TEXTCLAP_MODELS_DIR: ~/textclap-models
        run: cargo test --test clap_integration
