name: CI

on:
  push:
    branches: [main, "0.*"]
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  schedule:
    - cron: "0 4 1 * *" # monthly

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        features: ["", "--all-features"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: textclap-${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            textclap-${{ runner.os }}-clippy-
      - run: cargo clippy --all-targets ${{ matrix.features }}

  # windows-latest excluded from build-test matrix.
  # The MSVC test binary link step fails with LNK2005 (already-defined symbols) because:
  #   - ort's prebuilt onnxruntime.dll uses MSVCP140.dll (dynamic CRT, msvcprt.lib)
  #   - esaxx-rs and onig_sys use libcpmt.lib (static CRT)
  # Mixing the two CRTs in a single test executable produces hundreds of duplicate
  # std::* symbol errors. Fixing this requires coordinating CRT flags across the
  # entire C-FFI dependency graph; out of scope for v0.1.0.
  # `cargo build --lib` itself succeeds on Windows; only the test binary link fails.
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: textclap-${{ runner.os }}-build-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            textclap-${{ runner.os }}-build-test-
      - run: cargo build --verbose
      - run: cargo test --lib --verbose

  doctest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: textclap-${{ runner.os }}-doctest-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            textclap-${{ runner.os }}-doctest-
      - run: cargo test --doc --all-features

  # Build-only verification across selected non-host architectures. Confirms
  # the per-arch cfg gates on src/simd/x86_avx512.rs, x86_avx2.rs, and
  # neon.rs compile cleanly under each target_arch. Targets are limited to
  # those textclap can plausibly link given its `ort` (ONNX Runtime FFI) +
  # `tokenizers` (with `onig_sys` C build via cc-rs) dependencies; broader
  # cross targets that are exercised in colconv's reference CI (Android,
  # musl, powerpc64, riscv64, all wasm32-*) are skipped here because the
  # ORT/tokenizers C deps don't compile for them.
  cross:
    name: cross-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: textclap-${{ runner.os }}-cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            textclap-${{ runner.os }}-cross-${{ matrix.target }}-
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cross-compile toolchain
        run: |
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
              ;;
            x86_64-pc-windows-gnu)
              sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64
              ;;
          esac
      - name: cargo build --target ${{ matrix.target }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --lib --target ${{ matrix.target }}

  # Run the x86_64 lib test suite under Intel SDE with Ice Lake (`-icx`)
  # emulation. The standard ubuntu-latest runner is AMD Milan (no native
  # AVX-512), so without SDE the AVX-512 kernel's
  # `is_x86_feature_detected!("avx512f")` gate returns false and the
  # AVX-512 dispatch path is dead code at runtime. With SDE, `-icx`
  # reports AVX-512F via its CPUID intercept, so the new kernels in
  # src/simd/x86_avx512.rs actually execute and compare against the
  # scalar reference in `simd::tests::*`.
  #
  # SDE slowdown is ~5-10×; lib tests are pure compute so they run in
  # well under a minute even under emulation.
  test-sde-avx512:
    name: test-sde-avx512
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: textclap-${{ runner.os }}-test-sde-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            textclap-${{ runner.os }}-test-sde-
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Intel SDE
        uses: petarpetrovt/setup-sde@v3.0
        with:
          sdeVersion: 9.33.0
          environmentVariableName: SDE_PATH
      - name: Run lib tests under SDE (-icx, Ice Lake AVX-512)
        # The `petarpetrovt/setup-sde` action exports `SDE_PATH` but does
        # not add the extracted directory to `PATH`, so `sde64` isn't on
        # PATH directly. Resolve the full path via shell expansion before
        # handing it to cargo as the runner.
        #
        # `cargo test --lib` (NOT --all-features). The optional `serde`
        # feature doesn't change SIMD behavior; lib tests cover
        # `simd::tests::*` which is what the AVX-512 emulation gates.
        shell: bash
        run: |
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER="$SDE_PATH/sde64 -icx --"
          cargo test --lib

  # aarch64-apple-darwin excluded from miri matrices.
  # Miri's NEON intrinsic emulation is incomplete — `llvm.aarch64.neon.faddv.f64.v2f64`
  # (used by `vaddvq_f64` in simd::neon::mel_filterbank_dot) is unsupported. NEON is the
  # aarch64 baseline so the dispatcher routes there under Miri, hitting the unsupported
  # intrinsic on the second test case.
  #
  # x86_64 Miri works because runtime feature detection returns false for AVX2/AVX-512,
  # so the dispatcher falls through to the scalar reference. Miri verifies the scalar
  # kernel (which is 100% safe Rust) and the dispatcher control flow.
  #
  # Re-enable aarch64 Miri when stdarch's faddv emulation lands.
  miri-tb:
    name: miri-tb-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: textclap-${{ runner.os }}-miri-tb-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            textclap-${{ runner.os }}-miri-tb-${{ matrix.target }}-
      - name: Miri (tree-borrows)
        run: bash ci/miri_tb.sh "${{ matrix.target }}"

  miri-sb:
    name: miri-sb-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: textclap-${{ runner.os }}-miri-sb-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            textclap-${{ runner.os }}-miri-sb-${{ matrix.target }}-
      - name: Miri (stacked-borrows)
        run: bash ci/miri_sb.sh "${{ matrix.target }}"

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-tarpaulin
      - run: cargo tarpaulin --out Xml --workspace --all-features
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cobertura.xml

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache models
        id: cache-models
        uses: actions/cache@v5
        with:
          path: ~/textclap-models
          key: textclap-models-${{ hashFiles('models/MODELS.md') }}
      - name: Download models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/textclap-models
          # HF revision pin: parsed from the `Revision: <sha>` line in MODELS.md.
          REV=$(awk '/^Revision:/ {print $2; exit}' models/MODELS.md)
          if [ -z "$REV" ]; then echo "Could not parse Revision: from MODELS.md" >&2; exit 1; fi
          curl -L -o ~/textclap-models/audio_model_quantized.onnx \
            "https://huggingface.co/Xenova/clap-htsat-unfused/resolve/${REV}/onnx/audio_model_quantized.onnx"
          curl -L -o ~/textclap-models/text_model_quantized.onnx \
            "https://huggingface.co/Xenova/clap-htsat-unfused/resolve/${REV}/onnx/text_model_quantized.onnx"
          curl -L -o ~/textclap-models/tokenizer.json \
            "https://huggingface.co/Xenova/clap-htsat-unfused/resolve/${REV}/tokenizer.json"
          # Verify SHA256s using the native sha256sum sidecar.
          cd ~/textclap-models
          sha256sum -c "$GITHUB_WORKSPACE/models/MODELS.sha256"
      - name: Run integration tests
        run: |
          export TEXTCLAP_MODELS_DIR="$HOME/textclap-models"
          cargo test --test clap_integration

# NOT INCLUDED: test-wasm-simd128 (analogous to colconv's job).
# textclap depends on `ort` (ONNX Runtime FFI) and `tokenizers` (with
# `onig_sys` C build via cc-rs, plus `esaxx-rs` C++ tokenizer), none of
# which compile to wasm32-wasip1 or wasm32-unknown-unknown. Local probe:
#
#   $ cargo build --lib --target wasm32-wasip1
#   error: ort-sys does not provide prebuilt binaries for wasm32-wasip1
#   error: esaxx-rs failed: 'cstdint' not found (no libc++ sysroot)
#
#   $ cargo check --target wasm32-unknown-unknown -p textclap --no-default-features
#   error: onig_sys failed: 'stdlib.h' not found
#   error: getrandom requires the `wasm_js` configuration flag
#
# The wasm32 simd128 backend at src/simd/wasm_simd128.rs is therefore
# compile-only verified (via `cargo check` on isolated mini-crates during
# local development); runtime behavior on simd128 hardware is exercised
# only when downstream callers carve out a wasm-targeting shape.
#
# Jobs intentionally NOT included from colconv's reference CI:
#
# - sanitizer (ASan/LSan/MSan/TSan): textclap's lib tests don't exercise
#   the SIMD `unsafe` paths in isolation — the `simd::tests::*` block
#   does, but those are pure compute. ASan would mostly check the
#   integration tests, which require ORT FFI and add complexity that
#   exceeds the value-vs-cost tradeoff for v0.1.0. Miri-tb / miri-sb
#   cover the SIMD pointer arithmetic adequately.
#
# - benchmark (Criterion regression tracking): the `benches/` already
#   exist; running them in CI is heavy and noisy without baseline
#   storage. Add later if performance regressions become a concern.
